name: Test JHU Logic

on:
  push:
    paths:
      - 'scripts/process_jhu_data.py'
  workflow_dispatch:

jobs:
  test-jhu:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run JHU Processor
        run: python scripts/process_jhu_data.py

      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add jhu_us_summary.csv
          # Prevent failure if no changes occurred
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated JHU data update: $(date -u +'%Y-%m-%d')" && git push)
