name: Update Measles Data

on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 UTC every day
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Explicitly required to push commits

steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pandas requests playwright beautifulsoup4
          python -m playwright install chromium --with-deps
      - name: Execute ETL script
        run: python scripts/update_measles_data.py
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests lxml beautifulsoup4 html5lib

      - name: Execute ETL script
        run: python scripts/update_measles_data.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add measles_na_update.csv
          
          # Prevent workflow failure if no data changes occurred
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated data update: $(date -u +'%Y-%m-%d')" && git push)
