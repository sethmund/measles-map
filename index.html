<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>2026 North America Measles Tracker</title>
    <style>
        /* FORCE DARK MODE */
        html, body { 
            background-color: #050505 !important; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }

        #status {
            position: absolute; 
            bottom: 30px; 
            left: 20px;
            background: rgba(20, 20, 20, 0.85); 
            border: 1px solid #333;
            color: #eee;
            padding: 20px; 
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            min-width: 240px;
            pointer-events: none;
        }

        h2 { margin: 0 0 10px 0; font-size: 18px; color: #ff4444; letter-spacing: 1px; text-transform: uppercase; }
        .stat-line { font-size: 14px; color: #aaa; margin-bottom: 6px; }
        .highlight { color: #fff; font-weight: bold; font-size: 16px;}

        #legend-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(20, 20, 20, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        svg { display: block; width: 100%; height: 100%; }

        .state { 
            stroke: #222; 
            stroke-width: 0.5; 
            cursor: pointer; 
            transition: fill 0.3s ease; 
        }
        .state:hover { 
            stroke: #fff; 
            stroke-width: 1.5; 
            filter: brightness(1.2);
        }

        .county { 
            stroke: rgba(0,0,0,0.2); 
            stroke-width: 0.2; 
        }

        .tooltip {
            position: absolute; 
            background: rgba(10, 10, 10, 0.95); 
            color: #fff; 
            padding: 10px 14px; 
            border: 1px solid #444;
            border-radius: 6px; 
            pointer-events: none; 
            opacity: 0; 
            font-size: 13px; 
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
</head>
<body>

<div id="status">
    <h2>2026 Measles Tracker</h2>
    <div class="stat-line" id="loading-msg">⏳ Synchronizing North America...</div>
    <div class="stat-line" id="data-stats"></div>
    <div style="margin-top:15px; font-size:11px; color:#555; border-top:1px solid #333; padding-top:10px;">
        Scope: Lab-Confirmed Cases<br>
        Updated: 2026-03-07
    </div>
</div>

<div id="legend-container"></div>
<div class="tooltip"></div>

<script>
// --- CONFIGURATION ---
const GEO_URL = "NA.json";
const DATA_URL = "measles_na_update.csv";

const width = window.innerWidth, height = window.innerHeight;
const svg = d3.select('body').append('svg').attr('viewBox', [0, 0, width, height]);
const g = svg.append("g");
const tooltip = d3.select(".tooltip");

const color = d3.scaleThreshold()
    .domain([1, 10, 50, 100, 500])
    .range(["#1a1a1a", "#4a0404", "#8a0808", "#c40c0c", "#ff1111", "#ff5555"]);

const projection = d3.geoConicEqualArea()
    .parallels([15, 60]).rotate([100, 0]).center([0, 38])
    .scale(width * 0.5).translate([width / 2, height / 2]);

const path = d3.geoPath().projection(projection);

const zoom = d3.zoom()
    .scaleExtent([1, 12])
    .on("zoom", (event) => g.attr("transform", event.transform));

const showTooltip = (event, name, val = 0) => {
    tooltip.style("opacity", 1)
        .html(`<strong>${name}</strong><br>Confirmed: ${(+val).toLocaleString()}`)
        .style("left", (event.pageX + 15) + "px")
        .style("top", (event.pageY - 28) + "px");
};

// --- DATA LOAD & RENDER ---
Promise.all([
    d3.json(GEO_URL), 
    d3.csv(DATA_URL)
]).then(([na, rawData]) => {
    
    const nameMap = new Map(); 
    const fipsMap = new Map(); 
    let globalSum = 0;

    rawData.forEach(d => {
        const val = +d.Confirmed || 0;
        globalSum += val;
        nameMap.set(d.Province_State, (nameMap.get(d.Province_State) || 0) + val);
        if (d.Country_Region === "US") fipsMap.set(d.ISO3166_2, val);
    });

    document.getElementById("loading-msg").innerHTML = "<span style='color:#4caf50'>● Data Synchronized</span>";
    document.getElementById("data-stats").innerHTML = `Total Cases: <span class="highlight">${globalSum.toLocaleString()}</span>`;

    // 1. EXTRACT FEATURES 
    // IMPORTANT: Replace 'canada', 'mexico', 'states', and 'counties' with your actual NA.json object keys.
    const caFeatures = topojson.feature(na, na.objects.canada).features;
    const mxFeatures = topojson.feature(na, na.objects.mexico).features;
    const usStates = topojson.feature(na, na.objects.states).features;
    const usCounties = topojson.feature(na, na.objects.counties).features;

    // 2. DRAW INTERNATIONAL (Canada & Mexico)
    g.append("g").selectAll("path")
        .data([...caFeatures, ...mxFeatures])
        .join("path").attr("class", "state").attr("d", path)
        .attr("fill", d => {
            // Target 'name' for Canada, 'state_name' for Mexico
            const regionName = d.properties.name || d.properties.state_name;
            return color(nameMap.get(regionName) || 0);
        })
        .on("mouseover", (e, d) => {
            const regionName = d.properties.name || d.properties.state_name;
            showTooltip(e, regionName, nameMap.get(regionName));
        })
        .on("mouseout", () => tooltip.style("opacity", 0));

    // 3. DRAW US STATES (Includes Zoom Interaction)
    g.append("g").selectAll("path")
        .data(usStates).join("path")
        .attr("class", "state").attr("d", path)
        .attr("fill", d => color(nameMap.get(d.properties.name) || 0))
        .on("mouseover", (e, d) => showTooltip(e, d.properties.name, nameMap.get(d.properties.name)))
        .on("mouseout", () => tooltip.style("opacity", 0))
        .on("click", (event, d) => {
            event.stopPropagation();
            const [[x0, y0], [x1, y1]] = path.bounds(d);
            svg.transition().duration(750).call(
                zoom.transform,
                d3.zoomIdentity.translate(width/2, height/2)
                    .scale(Math.min(8, 0.9 / Math.max((x1-x0)/width, (y1-y0)/height)))
                    .translate(-(x0+x1)/2, -(y0+y1)/2)
            );
            renderCounties(d, usCounties);
        });

    // 4. COUNTY DRILL-DOWN LOGIC
    function renderCounties(stateFeature, allCounties) {
        g.selectAll(".county-layer").remove();
        
        // Filter counties belonging to the clicked state based on ID/FIPS prefix
        const stateCounties = allCounties.filter(c => c.id && c.id.startsWith(stateFeature.id));
        
        g.append("g").attr("class", "county-layer").selectAll("path")
            .data(stateCounties).join("path").attr("class", "state county")
            .attr("d", path)
            .attr("fill", d => {
                const countVal = fipsMap.get(d.id) || 0;
                // Fallback to preserve state-level heatmap visualization if county data is undefined (e.g., FIPS 00000)
                return countVal > 0 ? color(countVal) : (nameMap.get(stateFeature.properties.name) > 0 ? "#2a0000" : "#1a1a1a");
            })
            .on("mouseover", (e, d) => showTooltip(e, d.properties.name, fipsMap.get(d.id)))
            .on("mouseout", () => tooltip.style("opacity", 0));
    }

svg.call(zoom).on("click", () => {
        svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
        g.selectAll(".county-layer").remove();
    });

}).catch(err => {
    document.getElementById("loading-msg").innerHTML = `<span style="color:#ff4444">❌ Load Error: ${err.message}</span>`;
});
</script>
</body>
</html>
