<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>2026 North America Measles Tracker</title>
    <style>
        /* FORCE DARK MODE */
        html, body { 
            background-color: #050505 !important; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }

        #status {
            position: absolute; 
            bottom: 30px; 
            left: 20px;
            background: rgba(20, 20, 20, 0.85); 
            border: 1px solid #333;
            color: #eee;
            padding: 20px; 
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            min-width: 240px;
            pointer-events: none;
        }

        h2 { margin: 0 0 10px 0; font-size: 18px; color: #ff4444; letter-spacing: 1px; text-transform: uppercase; }
        .stat-line { font-size: 14px; color: #aaa; margin-bottom: 6px; }
        .highlight { color: #fff; font-weight: bold; font-size: 16px;}

        #legend-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(20, 20, 20, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        svg { display: block; width: 100%; height: 100%; }

        .state { 
            stroke: #222; 
            stroke-width: 0.5; 
            cursor: pointer; 
            transition: fill 0.3s ease; 
        }
        .state:hover { 
            stroke: #fff; 
            stroke-width: 1.5; 
            filter: brightness(1.2);
        }

        .county { 
            stroke: rgba(0,0,0,0.2); 
            stroke-width: 0.2; 
        }

        .tooltip {
            position: absolute; 
            background: rgba(10, 10, 10, 0.95); 
            color: #fff; 
            padding: 10px 14px; 
            border: 1px solid #444;
            border-radius: 6px; 
            pointer-events: none; 
            opacity: 0; 
            font-size: 13px; 
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
</head>
<body>

<div id="status">
    <h2>2026 Measles Tracker</h2>
    <div class="stat-line" id="loading-msg">⏳ Synchronizing North America...</div>
    <div class="stat-line" id="data-stats"></div>
    <div style="margin-top:15px; font-size:11px; color:#555; border-top:1px solid #333; padding-top:10px;">
        Scope: Lab-Confirmed Cases<br>
        Updated: 2026-03-07
    </div>
</div>

<div id="legend-container"></div>
<div class="tooltip"></div>

<script>
// --- MAP & DATA CONFIGURATION ---
const DATA_URL = "measles_na_update.csv";
const ATLAS_URL = "https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json";
const NA_GEO_URL = "https://raw.githubusercontent.com/codeforgermany/click_dummy_poverty_map/master/src/data/topojson/north-america.json";

const DOMAIN = [1, 10, 50, 100, 500];
const RANGE = ["#1a1a1a", "#4a0404", "#8a0808", "#c40c0c", "#ff1111", "#ff5555"];
const color = d3.scaleThreshold().domain(DOMAIN).range(RANGE);

(async function() {
    const width = window.innerWidth;
    const height = window.innerHeight;
    const svg = d3.select('body').append('svg').attr('viewBox', [0, 0, width, height]);
    const g = svg.append("g");
    const tooltip = d3.select(".tooltip");

    const projection = d3.geoConicEqualArea()
        .parallels([15, 60])
        .rotate([100, 0])
        .center([0, 38])
        .scale(width * 0.5) 
        .translate([width / 2, height / 2]);

    const path = d3.geoPath().projection(projection);
    const zoom = d3.zoom().scaleExtent([1, 12]).on("zoom", e => g.attr("transform", e.transform));

    try {
        // Parallel Load
        const [us, na, rawData] = await Promise.all([
            d3.json(ATLAS_URL),
            d3.json(NA_GEO_URL),
            d3.csv(DATA_URL)
        ]);

        // 1. Unified Data Lookup
        const masterDataMap = new Map();
        const stateTotals = new Map();
        let globalSum = 0;

        rawData.forEach(d => {
            const val = +d.Confirmed || 0;
            globalSum += val;
            
            if (d.Country_Region === "US") {
                const fips = (d.ISO3166_2 || "").toString().padStart(5, "0");
                const stateFips = fips.substring(0, 2);
                masterDataMap.set(fips, val);
                stateTotals.set(stateFips, (stateTotals.get(stateFips) || 0) + val);
            } else {
                masterDataMap.set(d.Province_State, val);
            }
        });

        // 2. UI Refresh
        document.getElementById("loading-msg").innerHTML = "<span style='color:#4caf50'>● Data Synchronized</span>";
        document.getElementById("data-stats").innerHTML = `Total Cases: <span class="highlight">${globalSum.toLocaleString()}</span>`;

        // 3. Draw Canada & Mexico (topojson na_states)
        g.append("g").selectAll("path")
            .data(topojson.feature(na, na.objects.na_states).features.filter(d => d.properties.country !== "USA"))
            .join("path")
            .attr("class", "state")
            .attr("d", path)
            .attr("fill", d => color(masterDataMap.get(d.properties.name) || 0))
            .on("mouseover", (e, d) => showTooltip(e, d.properties.name, masterDataMap.get(d.properties.name)))
            .on("mouseout", hideTooltip);

        // 4. Draw US States
        const states = topojson.feature(us, us.objects.states).features;
        const counties = topojson.feature(us, us.objects.counties).features;

        g.append("g").selectAll("path")
            .data(states)
            .join("path")
            .attr("class", "state state-us")
            .attr("d", path)
            .attr("fill", d => color(stateTotals.get(d.id) || 0))
            .on("mouseover", (e, d) => showTooltip(e, d.properties.name, stateTotals.get(d.id)))
            .on("mouseout", hideTooltip)
            .on("click", (e, d) => {
                const [[x0, y0], [x1, y1]] = path.bounds(d);
                e.stopPropagation();
                svg.transition().duration(750).call(
                    zoom.transform, 
                    d3.zoomIdentity.translate(width/2, height/2).scale(Math.min(8, 0.9 / Math.max((x1 - x0) / width, (y1 - y0) / height))).translate(-(x0 + x1) / 2, -(y0 + y1) / 2)
                );
                renderCounties(d);
            });

        // 5. County View
        function renderCounties(stateFeature) {
            g.selectAll(".county").remove();
            const stateCounties = counties.filter(c => c.id.startsWith(stateFeature.id));
            g.append("g").selectAll("path")
                .data(stateCounties)
                .join("path")
                .attr("class", "county state")
                .attr("d", path)
                .attr("fill", d => color(masterDataMap.get(d.id) || 0))
                .on("mouseover", (e, d) => showTooltip(e, d.properties.name, masterDataMap.get(d.id)))
                .on("mouseout", hideTooltip);
        }

        svg.call(zoom).on("click", () => {
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
            g.selectAll(".county").remove();
        });

        drawLegend();

    } catch (e) { document.getElementById("loading-msg").textContent = "❌ Error: " + e.message; }

    function showTooltip(event, name, val = 0) {
        tooltip.style("opacity", 1)
            .html(`<strong>${name}</strong><br>Confirmed: ${(+val).toLocaleString()}`)
            .style("left", (event.pageX + 15) + "px")
            .style("top", (event.pageY - 28) + "px");
    }
    function hideTooltip() { tooltip.style("opacity", 0); }

    function drawLegend() {
        const legend = d3.select("#legend-container").append("svg").attr("width", 210).attr("height", 45);
        const legendData = DOMAIN.map((d, i) => ({ color: RANGE[i+1], label: d }));
        legend.selectAll("rect").data(legendData).join("rect")
            .attr("x", (d, i) => i * 35).attr("y", 10).attr("width", 35).attr("height", 10).attr("fill", d => d.color);
        legend.selectAll("text").data(legendData).join("text")
            .attr("x", (d, i) => i * 35).attr("y", 35).style("font-size", "10px").style("fill", "#888").text(d => d.label);
    }
})();
</script>
</body>
</html>
