<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>2026 North America Measles Tracker</title>
    <style>
        /* FORCE DARK MODE */
        html, body { 
            background-color: #050505 !important; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }

        #status {
            position: absolute; 
            bottom: 30px; 
            left: 20px;
            background: rgba(20, 20, 20, 0.85); 
            border: 1px solid #333;
            color: #eee;
            padding: 20px; 
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            min-width: 240px;
            pointer-events: none;
        }

        h2 { margin: 0 0 10px 0; font-size: 18px; color: #ff4444; letter-spacing: 1px; text-transform: uppercase; }
        .stat-line { font-size: 14px; color: #aaa; margin-bottom: 6px; }
        .highlight { color: #fff; font-weight: bold; font-size: 16px;}

        #legend-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(20, 20, 20, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        svg { display: block; width: 100%; height: 100%; }

        .state { 
            stroke: #222; 
            stroke-width: 0.5; 
            cursor: pointer; 
            transition: fill 0.3s ease; 
        }
        .state:hover { 
            stroke: #fff; 
            stroke-width: 1.5; 
            filter: brightness(1.2);
        }

        .county { 
            stroke: rgba(0,0,0,0.2); 
            stroke-width: 0.2; 
        }

        .tooltip {
            position: absolute; 
            background: rgba(10, 10, 10, 0.95); 
            color: #fff; 
            padding: 10px 14px; 
            border: 1px solid #444;
            border-radius: 6px; 
            pointer-events: none; 
            opacity: 0; 
            font-size: 13px; 
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
</head>
<body>

<div id="status">
    <h2>2026 Measles Tracker</h2>
    <div class="stat-line" id="loading-msg">⏳ Synchronizing North America...</div>
    <div class="stat-line" id="data-stats"></div>
    <div style="margin-top:15px; font-size:11px; color:#555; border-top:1px solid #333; padding-top:10px;">
        Scope: Lab-Confirmed Cases<br>
        Updated: 2026-03-07
    </div>
</div>

<div id="legend-container"></div>
<div class="tooltip"></div>

<script>
// --- CONFIGURATION ---
const US_GEO = "https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json";
const DATA_URL = "measles_na_update.csv";

// 1. INITIALIZE D3 CONSTANTS
const width = window.innerWidth;
const height = window.innerHeight;
const DOMAIN = [1, 10, 50, 100, 500];
const RANGE = ["#1a1a1a", "#4a0404", "#8a0808", "#c40c0c", "#ff1111", "#ff5555"];

const svg = d3.select('body').append('svg').attr('viewBox', [0, 0, width, height]);
const g = svg.append("g");
const tooltip = d3.select(".tooltip");

// 2. DEFINE PROJECTION & SCALES
const color = d3.scaleThreshold().domain(DOMAIN).range(RANGE);
const projection = d3.geoConicEqualArea()
    .parallels([15, 60])
    .rotate([100, 0])
    .center([0, 38])
    .scale(width * 0.5) 
    .translate([width / 2, height / 2]);

const path = d3.geoPath().projection(projection);

// 3. TOOLTIP FUNCTIONS
const showTooltip = (event, name, val = 0) => {
    tooltip.style("opacity", 1)
        .html(`<strong>${name}</strong><br>Confirmed: ${(+val).toLocaleString()}`)
        .style("left", (event.pageX + 15) + "px")
        .style("top", (event.pageY - 28) + "px");
};
const hideTooltip = () => tooltip.style("opacity", 0);

// 4. MAIN DATA LOAD
Promise.all([
    d3.json("canada.json"), 
    d3.json("mx.json"),     
    d3.json(US_GEO),        
    d3.csv(DATA_URL)
]).then(([ca, mx, us, rawData]) => {
    
    // Aggregate by Name to solve '00000' FIPS issue (SC, UT, VA)
    const nameDataMap = new Map();
    let globalSum = 0;

    rawData.forEach(d => {
        const val = +d.Confirmed || 0;
        const name = d.Province_State;
        globalSum += val;
        nameDataMap.set(name, (nameDataMap.get(name) || 0) + val);
    });

    // Update UI
    document.getElementById("loading-msg").innerHTML = "<span style='color:#4caf50'>● Connection Secure</span>";
    document.getElementById("data-stats").innerHTML = `Total Cases: <span class="highlight">${globalSum.toLocaleString()}</span>`;

    // DRAW CANADA
    g.append("g").selectAll("path")
        .data(topojson.feature(ca, ca.objects.ne_10m_admin_1_states_provinces).features)
        .join("path").attr("class", "state").attr("d", path)
        .attr("fill", d => color(nameDataMap.get(d.properties.name) || 0))
        .on("mouseover", (e, d) => showTooltip(e, d.properties.name, nameDataMap.get(d.properties.name)))
        .on("mouseout", hideTooltip);

    // DRAW MEXICO
    g.append("g").selectAll("path")
        .data(topojson.feature(mx, mx.objects.mexico).features)
        .join("path").attr("class", "state").attr("d", path)
        .attr("fill", d => color(nameDataMap.get(d.properties.name) || 0))
        .on("mouseover", (e, d) => showTooltip(e, d.properties.name, nameDataMap.get(d.properties.name)))
        .on("mouseout", hideTooltip);

    // DRAW US STATES
    g.append("g").selectAll("path")
        .data(topojson.feature(us, us.objects.states).features)
        .join("path").attr("class", "state").attr("d", path)
        .attr("fill", d => color(nameDataMap.get(d.properties.name) || 0))
        .on("mouseover", (e, d) => showTooltip(e, d.properties.name, nameDataMap.get(d.properties.name)))
        .on("mouseout", hideTooltip);

}).catch(err => {
    document.getElementById("loading-msg").innerHTML = `<span style="color:#ff4444">❌ Error: ${err.message}</span>`;
});
</script>
</body>
</html>
