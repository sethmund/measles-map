<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>2026 Measles Tracker</title>
    <style>
        /* FORCE DARK MODE */
        html, body { 
            background-color: #050505 !important; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }

        /* CONTROLS CONTAINER (Top Right) */
        #controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        /* DATE DROPDOWN */
        select {
            background: rgba(30, 30, 30, 0.9);
            color: #fff;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            backdrop-filter: blur(5px);
        }
        select:hover { border-color: #777; }

        /* INFO BOX - MOVED TO BOTTOM LEFT */
        #status {
            position: absolute; 
            bottom: 30px; 
            left: 20px;
            background: rgba(20, 20, 20, 0.8); 
            border: 1px solid #333;
            color: #eee;
            padding: 20px; 
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            min-width: 220px;
            pointer-events: none; /* Click through to Hawaii/Alaska if needed */
        }
        #status > * { pointer-events: auto; }

        h2 { margin: 0 0 10px 0; font-size: 18px; color: #ff4444; letter-spacing: 1px; text-transform: uppercase; }
        .stat-line { font-size: 14px; color: #aaa; margin-bottom: 6px; }
        .highlight { color: #fff; font-weight: bold; font-size: 16px;}

        /* LEGEND CONTAINER (Bottom Right) */
        #legend-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(20, 20, 20, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: none;
        }

        /* SVG MAP */
        svg { display: block; width: 100%; height: 100%; }

        .state { 
            stroke: #222; 
            stroke-width: 1; 
            cursor: pointer; 
            transition: fill 0.3s ease; 
        }
        .state:hover { 
            stroke: #fff; 
            stroke-width: 2; 
            filter: brightness(1.3);
            z-index: 10;
        }

        .county { 
            stroke: rgba(0,0,0,0.3); 
            stroke-width: 0.5; 
            pointer-events: all; 
        }

        /* TOOLTIP */
        .tooltip {
            position: absolute; 
            background: rgba(10, 10, 10, 0.95); 
            color: #fff; 
            padding: 12px 16px; 
            border: 1px solid #444;
            border-radius: 6px; 
            pointer-events: none; 
            opacity: 0; 
            font-size: 13px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            transform: translate(-50%, -100%); 
            margin-top: -15px;
            white-space: nowrap; 
            z-index: 1000;
            line-height: 1.5;
        }
        .sub-text { font-size: 11px; color: #888; }
    </style>
    
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
</head>
<body>

<div id="controls">
    <select id="date-selector">
        <option value="all">📅 All Time (2026)</option>
    </select>
</div>

<div id="status">
    <h2>2026 Measles Tracker</h2>
    <div class="stat-line" id="loading-msg">⏳ Loading Data...</div>
    <div class="stat-line" id="data-stats"></div>
    <div style="margin-top:15px; font-size:11px; color:#555; border-top:1px solid #333; padding-top:10px;">
        Filter: Lab-Confirmed (2026)<br>
        Source: JHU CSSE
    </div>
</div>

<div id="legend-container"></div>
<div class="tooltip"></div>

<script>
// --- CONFIGURATION ---
const JHU_URL = "https://raw.githubusercontent.com/CSSEGISandData/measles_data/main/measles_county_all_updates_detailed.csv";
const ATLAS_URL = "https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json";
const INTL_DATA_URL = "measles_na_update.csv"; // Your ETL output
const NA_GEO_URL = "https://raw.githubusercontent.com/codeforgermany/click_dummy_poverty_map/master/src/data/topojson/north-america.json";

// COLOR CONFIGURATION
const DOMAIN = [1, 10, 50, 100, 500];
const RANGE = ["#1a1a1a", "#4a0404", "#8a0808", "#c40c0c", "#ff1111", "#ff5555"];

(async function() {
    const width = window.innerWidth;
    const height = window.innerHeight;
    const svg = d3.select('body').append('svg').attr('viewBox', [0, 0, width, height]);
    const tooltip = d3.select(".tooltip");
    
    // Shifted to Conic Projection for North America coverage
    const projection = d3.geoConicConic()
        .parallels([15, 60])
        .rotate([100, 0])
        .center([0, 38])
        .scale(width * 0.5) 
        .translate([width / 2, height / 2]);

    const path = d3.geoPath().projection(projection);
    const zoom = d3.zoom().scaleExtent([1, 8]).on("zoom", e => g.attr("transform", e.transform));
    const g = svg.append("g");

    // DATA STORAGE
    let fullRawData = [];
    let intlRawData = [];
    let usTopology = null;
    let naTopology = null;
    let nameToFips = new Map();

    try {
        const [us, na, rawData, intlData] = await Promise.all([
            d3.json(ATLAS_URL),
            d3.json(NA_GEO_URL),
            d3.csv(JHU_URL),
            d3.csv(INTL_DATA_URL)
        ]);

        fullRawData = rawData;
        intlRawData = intlData;
        usTopology = us;
        naTopology = na;
        
        const states = topojson.feature(us, us.objects.states).features;
        const counties = topojson.feature(us, us.objects.counties).features;
        
        states.forEach(s => nameToFips.set(s.properties.name, s.id));

        document.getElementById("loading-msg").innerHTML = "<span style='color:#4caf50'>● North America Active</span>";

        // Setup Date Dropdown (US Data only)
        const dates = new Set();
        fullRawData.forEach(d => { if (d.date && d.date.startsWith("2026")) dates.add(d.date); });
        const sortedDates = Array.from(dates).sort().reverse();
        const selector = d3.select("#date-selector");
        sortedDates.forEach(date => selector.append("option").attr("value", date).text(date));

        selector.on("change", function() { updateMap(this.value); });

        const color = d3.scaleThreshold().domain(DOMAIN).range(RANGE);
        drawLegend(color);

        // INITIAL RENDER
        updateMap("all");

        function updateMap(selectedDate) {
            const countyData = new Map();
            const stateData = new Map();
            const intlDataMap = new Map(intlRawData.map(d => [d.Province_State, +d.Confirmed]));
            
            states.forEach(s => stateData.set(s.id, { total: 0, unassigned: 0 }));

            let globalTotal = 0;

            // Process US Data
            fullRawData.forEach(d => {
                if (d.outcome_type !== 'case_lab-confirmed') return;
                if (!d.date || !d.date.startsWith("2026")) return;
                if (selectedDate !== "all" && d.date !== selectedDate) return;

                const val = +d.value || 0;
                let fips = (d.location_id || "").toString().padStart(5, "0");
                let stateFips = fips.substring(0, 2);
                
                if (stateData.has(stateFips)) {
                    const stats = stateData.get(stateFips);
                    stats.total += val;
                    if (fips.endsWith("000")) stats.unassigned += val;
                    else countyData.set(fips, (countyData.get(fips) || 0) + val);
                    globalTotal += val;
                }
            });

            // Process Intl Data (YTD)
            const intlTotal = d3.sum(intlRawData, d => +d.Confirmed);
            globalTotal += intlTotal;

            const label = selectedDate === "all" ? "Total NA Cases" : `US ${selectedDate} + Intl YTD`;
            document.getElementById("data-stats").innerHTML = `${label}: <span class="highlight">${globalTotal.toLocaleString()}</span>`;

            // Draw Canada/Mexico Provinces
            const intlFeatures = topojson.feature(naTopology, naTopology.objects.na_states).features
                .filter(d => d.properties.country !== "USA");

            g.selectAll(".intl-province")
                .data(intlFeatures)
                .join("path")
                .attr("class", "state intl-province")
                .attr("d", path)
                .transition().duration(500)
                .attr("fill", d => {
                    const cases = intlDataMap.get(d.properties.name);
                    return cases ? color(cases) : "#151515";
                });

            g.selectAll(".intl-province")
                .on("mouseover", (event, d) => {
                    const cases = intlDataMap.get(d.properties.name) || 0;
                    showTooltip(event, d.properties.name, `<strong>${cases} Cases (2026 YTD)</strong>`);
                })
                .on("mouseout", hideTooltip);

            // Draw US States
            g.selectAll(".state-us")
                .data(states)
                .join("path")
                .attr("class", "state state-us")
                .attr("d", path)
                .on("click", clicked)
                .transition().duration(500)
                .attr("fill", d => {
                    const total = stateData.get(d.id)?.total || 0;
                    return total > 0 ? color(total) : "#151515";
                });

            g.selectAll(".state-us")
                .on("mouseover", (event, d) => {
                    const s = stateData.get(d.id);
                    showTooltip(event, d.properties.name, `<strong>${s?.total || 0} Cases</strong>`);
                })
                .on("mouseout", hideTooltip);

            window.renderCounties = function(stateFeature) {
                g.selectAll(".county").remove();
                const stateCounties = counties.filter(c => c.id.startsWith(stateFeature.id));
                g.append("g").selectAll("path").data(stateCounties).join("path")
                    .attr("class", "county").attr("d", path)
                    .attr("fill", d => color(countyData.get(d.id) || 0))
                    .on("mouseover", (event, d) => showTooltip(event, d.properties.name, `Confirmed: ${countyData.get(d.id) || 0}`))
                    .on("mouseout", hideTooltip).style("opacity", 0).transition().style("opacity", 1);
            };
        }

        function clicked(event, d) {
            const [[x0, y0], [x1, y1]] = path.bounds(d);
            const k = Math.min(8, 0.9 / Math.max((x1 - x0) / width, (y1 - y0) / height));
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity.translate(width/2 - (x0+x1)/2*k, height/2 - (y0+y1)/2*k).scale(k));
            if(window.renderCounties) window.renderCounties(d);
        }

        svg.call(zoom).on("click", () => {
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
            g.selectAll(".county").remove();
        });

    } catch (e) { document.getElementById("loading-msg").textContent = "❌ Error: " + e.message; }

    function drawLegend(colorScale) {
        const legendSvg = d3.select("#legend-container").append("svg").attr("width", 220).attr("height", 40);
        const legendData = DOMAIN.map((d, i) => ({ color: RANGE[i+1], label: d }));
        legendSvg.append("g").selectAll("rect").data(legendData).join("rect")
            .attr("x", (d, i) => i * 40).attr("width", 40).attr("height", 12).attr("fill", d => d.color).attr("stroke", "#333");
        legendSvg.append("g").selectAll("text").data(legendData).join("text")
            .attr("x", (d, i) => i * 40).attr("y", 25).style("font-size", "10px").style("fill", "#aaa").text(d => d.label);
    }

    function showTooltip(event, title, content) {
        tooltip.style("opacity", 1).html(`<div style="color:#ddd">${title}</div>${content}`)
            .style("left", event.pageX + "px").style("top", event.pageY + "px");
    }
    function hideTooltip() { tooltip.style("opacity", 0); }
})();
</script>
</body>
</html>
