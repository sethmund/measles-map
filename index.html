<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>2026 North America Measles Tracker</title>
    <style>
        /* FORCE DARK MODE */
        html, body { 
            background-color: #050505 !important; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }

        #status {
            position: absolute; 
            bottom: 30px; 
            left: 20px;
            background: rgba(20, 20, 20, 0.85); 
            border: 1px solid #333;
            color: #eee;
            padding: 20px; 
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            min-width: 240px;
            pointer-events: none;
        }

        h2 { margin: 0 0 10px 0; font-size: 18px; color: #ff4444; letter-spacing: 1px; text-transform: uppercase; }
        .stat-line { font-size: 14px; color: #aaa; margin-bottom: 6px; }
        .highlight { color: #fff; font-weight: bold; font-size: 16px;}

        #legend-container {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(20, 20, 20, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        svg { display: block; width: 100%; height: 100%; }

        .state { 
            stroke: #222; 
            stroke-width: 0.5; 
            cursor: pointer; 
            transition: fill 0.3s ease; 
        }
        .state:hover { 
            stroke: #fff; 
            stroke-width: 1.5; 
            filter: brightness(1.2);
        }

        .county { 
            stroke: rgba(0,0,0,0.2); 
            stroke-width: 0.2; 
        }

        .tooltip {
            position: absolute; 
            background: rgba(10, 10, 10, 0.95); 
            color: #fff; 
            padding: 10px 14px; 
            border: 1px solid #444;
            border-radius: 6px; 
            pointer-events: none; 
            opacity: 0; 
            font-size: 13px; 
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
</head>
<body>

<div id="status">
    <h2>2026 Measles Tracker</h2>
    <div class="stat-line" id="loading-msg">⏳ Synchronizing North America...</div>
    <div class="stat-line" id="data-stats"></div>
    <div style="margin-top:15px; font-size:11px; color:#555; border-top:1px solid #333; padding-top:10px;">
        Scope: Lab-Confirmed Cases<br>
        Updated: 2026-03-07
    </div>
</div>

<div id="legend-container"></div>
<div class="tooltip"></div>

<script>
const width = window.innerWidth, height = window.innerHeight;
const svg = d3.select('body').append('svg').attr('viewBox', [0, 0, width, height]);
const g = svg.append("g");
const tooltip = d3.select(".tooltip");

// Expanded domain to capture high-variance hotspots
const DOMAIN = [1, 50, 200, 500, 1000, 2000];
const RANGE = ["#1a1a1a", "#4a0404", "#7a0606", "#b50a0a", "#f00e0e", "#ff4d4d", "#ff9999"];

const color = d3.scaleThreshold().domain(DOMAIN).range(RANGE);

// --- LEGEND GENERATION ---
    const legendContainer = d3.select("#legend-container");
    legendContainer.html(""); // Clear existing contents

    const legendSvg = legendContainer.append("svg")
        .attr("width", 160)
        .attr("height", DOMAIN.length * 22 + 40);
        
    legendSvg.append("text")
        .attr("x", 0).attr("y", 15)
        .attr("fill", "#eee").attr("font-size", "13px").attr("font-weight", "bold")
        .text("Confirmed Cases");

    // Create a combined array for the legend keys: 0, then the domain thresholds
    const legendKeys = [0, ...DOMAIN];

    const legendItem = legendSvg.selectAll("g")
        .data(legendKeys)
        .join("g")
        .attr("transform", (d, i) => `translate(0, ${i * 22 + 25})`);

    legendItem.append("rect")
        .attr("width", 16).attr("height", 16)
        .attr("fill", d => color(d))
        .attr("stroke", "#333").attr("stroke-width", 0.5);

    legendItem.append("text")
        .attr("x", 26).attr("y", 12)
        .attr("fill", "#ccc").attr("font-size", "12px")
        .text((d, i) => {
            if (i === 0) return "0";
            if (i === legendKeys.length - 1) return `${d.toLocaleString()}+`;
            return `${d.toLocaleString()} - ${(legendKeys[i+1] - 1).toLocaleString()}`;
        });
    
const projection = d3.geoConicEqualArea()
    .parallels([15, 60]).rotate([100, 0]).center([0, 38])
    .scale(width * 0.5).translate([width / 2, height / 2]);

const path = d3.geoPath().projection(projection);

const zoom = d3.zoom()
    .scaleExtent([1, 12])
    .on("zoom", (event) => g.attr("transform", event.transform));

const showTooltip = (event, name, val = 0) => {
    tooltip.style("opacity", 1)
        .html(`<strong>${name}</strong><br>Confirmed: ${(+val).toLocaleString()}`)
        .style("left", (event.pageX + 15) + "px")
        .style("top", (event.pageY - 28) + "px");
};

const US_GEO_URL = "https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json";
const DATA_URL = "measles_na_update.csv";

Promise.all([
    d3.json("canada.json"), 
    d3.json("mx.json"),     
    d3.json(US_GEO_URL), 
    d3.csv(DATA_URL)
]).then(([ca, mx, us, rawData]) => {
    
const nameMap = new Map(); 
    const fipsMap = new Map(); 
    let usTotal = 0, mxTotal = 0, caTotal = 0;

    rawData.forEach(d => {
        const val = +d.Confirmed || 0;
        
        // Exclude aggregate and unassigned rows
        if (!d.Province_State || d.Province_State === "Unknown" || d.Province_State === "Unassigned" || d.Province_State === d.Country_Region) return;

        // Increment respective country totals
        if (d.Country_Region === "US") {
            usTotal += val;
            fipsMap.set(d.ISO3166_2, val);
        } else if (d.Country_Region === "Mexico") {
            mxTotal += val;
        } else if (d.Country_Region === "Canada") {
            caTotal += val;
        }

        nameMap.set(d.Province_State, (nameMap.get(d.Province_State) || 0) + val);
    });

    const globalSum = usTotal + mxTotal + caTotal;

    document.getElementById("loading-msg").innerHTML = "<span style='color:#4caf50'>● Data Synchronized</span>";
    document.getElementById("data-stats").innerHTML = `
        Total Cases: <span class="highlight">${globalSum.toLocaleString()}</span><br>
        <div style="font-size: 12px; margin-top: 4px; color: #aaa;">
            US: ${usTotal.toLocaleString()} | MX: ${mxTotal.toLocaleString()} | CA: ${caTotal.toLocaleString()}
        </div>
    `;

    // 1. DYNAMIC EXTRACTION
    // Automatically grabs the first layer from your local files to bypass any naming errors
    const caLayer = Object.keys(ca.objects)[0];
    const mxLayer = Object.keys(mx.objects)[0];

    const caFeatures = topojson.feature(ca, ca.objects[caLayer]).features;
    const mxFeatures = topojson.feature(mx, mx.objects[mxLayer]).features;
    const usStates = topojson.feature(us, us.objects.states).features;
    const usCounties = topojson.feature(us, us.objects.counties).features;

    // 2. DRAW INTERNATIONAL (Canada & Mexico)
    g.append("g").selectAll("path")
        .data([...caFeatures, ...mxFeatures])
        .join("path").attr("class", "state").attr("d", path)
        .attr("fill", d => {
            const regionName = d.properties.name || d.properties.state_name || d.properties.NOM_ENT;
            return color(nameMap.get(regionName) || 0);
        })
        .on("mouseover", (e, d) => {
            const regionName = d.properties.name || d.properties.state_name || d.properties.NOM_ENT;
            showTooltip(e, regionName, nameMap.get(regionName));
        })
        .on("mouseout", () => tooltip.style("opacity", 0));

    // 3. DRAW US STATES
    g.append("g").selectAll("path")
        .data(usStates).join("path")
        .attr("class", "state").attr("d", path)
        .attr("fill", d => color(nameMap.get(d.properties.name) || 0))
        .on("mouseover", (e, d) => showTooltip(e, d.properties.name, nameMap.get(d.properties.name)))
        .on("mouseout", () => tooltip.style("opacity", 0))
        .on("click", (event, d) => {
            event.stopPropagation();
            const [[x0, y0], [x1, y1]] = path.bounds(d);
            svg.transition().duration(750).call(
                zoom.transform,
                d3.zoomIdentity.translate(width/2, height/2)
                    .scale(Math.min(8, 0.9 / Math.max((x1-x0)/width, (y1-y0)/height)))
                    .translate(-(x0+x1)/2, -(y0+y1)/2)
            );
            renderCounties(d, usCounties);
        });

    // 4. COUNTY DRILL-DOWN LOGIC
    function renderCounties(stateFeature, allCounties) {
        g.selectAll(".county-layer").remove();
        
        const stateCounties = allCounties.filter(c => c.id && c.id.startsWith(stateFeature.id));
        
        g.append("g").attr("class", "county-layer").selectAll("path")
            .data(stateCounties).join("path").attr("class", "state county")
            .attr("d", path)
            .attr("fill", d => {
                const countVal = fipsMap.get(d.id) || 0;
                return countVal > 0 ? color(countVal) : (nameMap.get(stateFeature.properties.name) > 0 ? "#2a0000" : "#1a1a1a");
            })
            .on("mouseover", (e, d) => showTooltip(e, d.properties.name, fipsMap.get(d.id)))
            .on("mouseout", () => tooltip.style("opacity", 0));
    }

    svg.call(zoom).on("click", () => {
        svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
        g.selectAll(".county-layer").remove();
    });

}).catch(err => {
    document.getElementById("loading-msg").innerHTML = `<span style="color:#ff4444">❌ Load Error: ${err.message}</span>`;
});
</script>
</body>
</html>
